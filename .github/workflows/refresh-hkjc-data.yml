name: Refresh and deploy sanitized HKJC dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Baseline refresh around 09:00 Hong Kong time.
    - cron: "0 1 * * *"
    # Post-race refresh around 23:45 Hong Kong time on common HK race days.
    - cron: "45 15 * * 0,3,6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Refresh local model data in the ephemeral runner
        run: |
          npm run hkjc:refresh -- --historyDays 14 --futureDays 21 --bankroll 200 --minEdge 0 --minProbability 0.15 --maxStakePct 0.05 --finalEdgeBuffer 0.08
          npm run hkjc:auto-run -- --bankroll 200 --minEdge 0 --minProbability 0.15 --maxStakePct 0.05 --finalEdgeBuffer 0.08

      - name: Build public allowlist artifact
        run: npm run hkjc:build-public-site

      - name: Verify public artifact privacy
        run: npm run hkjc:privacy-scan

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload sanitized Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .public-site

      - name: Deploy sanitized Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
